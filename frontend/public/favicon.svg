<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#2563eb"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>

  <!-- Train icon (Lucide "train-front" style, centred at 16,16, scaled to ~18px) -->
  <!-- Body -->
  <rect x="9" y="8" width="14" height="13" rx="3" stroke="white" stroke-width="1.6" fill="none"/>
  <!-- Window row -->
  <rect x="11.5" y="10.5" width="4" height="3.5" rx="1" fill="white" opacity="0.9"/>
  <rect x="16.5" y="10.5" width="4" height="3.5" rx="1" fill="white" opacity="0.9"/>
  <!-- Centre stripe / door line -->
  <line x1="16" y1="15" x2="16" y2="21" stroke="white" stroke-width="1.4"/>
  <!-- Bottom bar -->
  <rect x="9" y="19" width="14" height="2" rx="0" fill="white" opacity="0.25"/>
  <!-- Wheels -->
  <circle cx="12" cy="23.5" r="2" stroke="white" stroke-width="1.5" fill="none"/>
  <circle cx="20" cy="23.5" r="2" stroke="white" stroke-width="1.5" fill="none"/>
  <!-- Axle -->
  <line x1="14" y1="23.5" x2="18" y2="23.5" stroke="white" stroke-width="1.4"/>
</svg>
